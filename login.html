<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LifeLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff0000;
            --primary-glow: rgba(255, 0, 0, 0.6);
            --bg-body: #050505;
            --bg-card: #121212;
            --text-main: #ffffff;
            --text-muted: #888;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Effects */
        body::before, body::after {
            content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); z-index: 0;
        }
        body::before { top: -100px; left: -100px; background: rgba(255, 0, 0, 0.2); }
        body::after { bottom: -100px; right: -100px; background: rgba(138, 0, 0, 0.15); }

        .login-box {
            position: relative; z-index: 10;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .logo { font-size: 2rem; font-weight: 800; margin-bottom: 30px; color: white; }
        .logo i { color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        
        input {
            width: 100%; padding: 15px;
            background: #000; border: 1px solid #333; border-radius: 8px;
            color: white; font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }

        button {
            width: 100%; padding: 15px; background: var(--primary); color: white;
            border: none; border-radius: 50px; font-size: 1rem; font-weight: bold; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }
        button:hover { box-shadow: 0 0 20px var(--primary-glow); transform: translateY(-2px); }

        .back-link { display: block; margin-top: 20px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo"><i class="fas fa-heartbeat"></i> LifeLink</div>
        <p style="color: #888; margin-bottom: 30px;">Secure Admin Access</p>
        
        <form onsubmit="checkLogin(event)">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter ID" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit">LOGIN TO DASHBOARD</button>
        </form>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Website</a>
    </div>

    <script>
        function checkLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            // HARDCODED CREDENTIALS FOR DEMO
            if(u === 'admin' && p === 'admin') {
                // Simulate loading
                document.querySelector('button').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
            } else {
                alert('Access Denied! Invalid Credentials.');
                // Shake animation
                document.querySelector('.login-box').style.animation = "none";
                void document.querySelector('.login-box').offsetWidth; // trigger reflow
                document.querySelector('.login-box').style.animation = "shake 0.5s";
            }
        }
    </script>
    <style>
        @keyframes shake {
            0% { transform: translateX(0); } 25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } 100% { transform: translateX(0); }
        }
    </style>
</body>
</html>
